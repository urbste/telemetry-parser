org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
# Not enabled by default: AGP 8.2 + JDK 21 often fails JdkImageTransform when storing the configuration cache.
# Re-enable when using JDK 17 or a newer AGP: org.gradle.configuration-cache=true
android.useAndroidX=true
android.nonTransitiveRClass=true
