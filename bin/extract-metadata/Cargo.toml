[package]
name = "extract-metadata"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "extract-metadata"
path = "extract-metadata.rs"

[dependencies]
argh = "0.1"
telemetry-parser = { path = "../.." }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
